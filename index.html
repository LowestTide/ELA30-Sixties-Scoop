<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sixties Scoop Collage</title>
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>
    <header>Sixties Scoop Collage</header>
    <main class="main-container">
        <div class="image-container">
            <img src="images/Indigenous-children-2.gif">
            <p class="image-text"></p>
        </div>
        <div class="image-container">
            <img src="images/indigenous-children-poster.webp">
            <p class="image-text"></p>
        </div>
        <div class="image-container">
            <img src="images/Sixties-Scoops-Newspaper.png">
            <p class="image-text">
                Newspaper advertisements for the Adopt Indian and Métis Program, late 1960s, Saskatchewan.

            </p>
        </div>
        <div class="image-container">
            <img src="images/Sixties-Scoop-protest.png">
            <p class="image-text">
                A congregation of protestors seeking justice for the Sixties (60's) Scoop. 
            </p>
        </div>
        <div class="image-container">
            <img src="images/Sixties-Scoop-world.png">
            <p class="image-text"></p>
        </div>

        
        

    </main>
    <footer>Made by <a>Pranav Dhokia</a>. Started production on 29 April, 2026. </footer>
    <scripts src="index.js"></script>
</body>
</html>
